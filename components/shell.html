<div class="shell">

  <!-- ── LEFT SIDEBAR ──────────────────────────────────────── -->
  <aside class="shell-sidebar">

    <div class="sidebar-logo">ENCLAVE</div>

    <nav class="sidebar-nav">
      <button class="sidebar-link" data-page="feed">Feed</button>
      <button class="sidebar-link" data-page="events">Events</button>
      <button class="sidebar-link" data-page="members">Members</button>
      <button class="sidebar-link" data-page="messages">Messages</button>
    </nav>

    <div class="sidebar-section">
      <div class="sidebar-heading">Circles</div>
      <button class="sidebar-link sidebar-sublink" data-circle="poker-crew">Poker Crew</button>
      <button class="sidebar-link sidebar-sublink" data-circle="work-network">Work Network</button>
      <button class="sidebar-link sidebar-sublink" data-circle="family">Family</button>
    </div>

    <div class="sidebar-profile">
      <div class="sidebar-profile-avatar" data-slot="user-avatar"></div>
      <div class="sidebar-profile-info">
        <div class="sidebar-profile-name"  data-slot="user-name">&mdash;</div>
        <div class="sidebar-profile-email" data-slot="user-email">&mdash;</div>
      </div>
      <button class="btn-ghost btn-icon" data-action="sign-out" title="Sign out">&#x21AA;</button>
    </div>

  </aside>

  <!-- ── CENTER (page slot) ────────────────────────────────── -->
  <main class="shell-main">
    <div data-slot="page"></div>
  </main>

  <!-- ── RIGHT PANEL ───────────────────────────────────────── -->
  <aside class="shell-right">

    <div class="panel-section">
      <div class="panel-heading">Online Now</div>
      <div class="panel-empty">No one online.</div>
    </div>

    <div class="panel-section">
      <div class="panel-heading">Upcoming Events</div>
      <div class="panel-empty" id="panelEvents">Loading...</div>
    </div>

    <div class="panel-section">
      <div class="panel-heading">Your Circles</div>
      <div class="panel-empty">Not in any circles yet.</div>
    </div>

  </aside>

</div>
