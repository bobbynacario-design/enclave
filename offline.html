<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — Enclave</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 24px;
      opacity: 0.7;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #94a3b8;
      max-width: 320px;
      margin-bottom: 32px;
    }
    a.btn {
      display: inline-block;
      padding: 12px 28px;
      background: #6366f1;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
    }
    a.btn:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>Enclave needs an internet connection to load the latest community updates. Reconnect and try again.</p>
  <a class="btn" href="/enclave/">Try again</a>
</body>
</html>
