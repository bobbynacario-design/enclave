<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enclave</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1A362B" />
  <!-- Google Search Console verification — replace PASTE_YOUR_CODE_HERE with your real code -->
  <meta name="google-site-verification" content="PASTE_YOUR_CODE_HERE" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Enclave" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=112" />
</head>
<body>

  <div id="app">
    <div id="loading">Loading...</div>
  </div>

  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    var savedTheme = localStorage.getItem('enclave_theme');
    if (savedTheme === 'light') document.body.classList.add('light');
  </script>
  <script type="module" src="app.js?v=112"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').then(function(reg) {
          // Listen for updates
          reg.addEventListener('updatefound', function() {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // New version available — silently use it on next page load
                console.log('[Enclave] New version installed; will activate on next load.');
              }
            });
          });
        }).catch(function(err) {
          console.error('[Enclave] Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
