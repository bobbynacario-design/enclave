<div class="page-header">
  <h1>Admin</h1>
  <p class="text-muted">Manage invites and circle access.</p>
</div>

<div class="card">
  <div class="page-header-row">
    <div>
      <h2 class="profile-name">Invite</h2>
      <p class="text-muted">Add an email to the allowlist and assign circles.</p>
    </div>
  </div>

  <div class="profile-section">
    <label class="profile-section-title" for="adminInviteEmail">Email</label>
    <input
      type="email"
      id="adminInviteEmail"
      class="edit-input"
      maxlength="120"
      placeholder="name@example.com"
      autocomplete="email"
    />
  </div>

  <div class="profile-section">
    <div class="profile-section-title">Circles</div>
    <div class="circle-checks" id="adminInviteCircles">
      <label class="circle-check">
        <input type="checkbox" value="poker-crew" />
        <span>Poker Crew</span>
      </label>
      <label class="circle-check">
        <input type="checkbox" value="work-network" />
        <span>Work Network</span>
      </label>
      <label class="circle-check">
        <input type="checkbox" value="family" />
        <span>Family</span>
      </label>
    </div>
  </div>

  <div class="edit-actions">
    <button class="btn btn-primary" id="adminInviteBtn">Save Invite</button>
  </div>
</div>

<div class="card">
  <div class="page-header-row">
    <div>
      <h2 class="profile-name">Members</h2>
      <p class="text-muted">Allowlisted emails and their assigned circles.</p>
    </div>
  </div>

  <div class="admin-members-list" id="adminMembersList">
    <div class="text-muted">Loading members...</div>
  </div>
</div>
