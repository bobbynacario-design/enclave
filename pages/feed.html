<div class="page-header">
  <h1>Feed</h1>
  <p class="text-muted">What's happening in the enclave.</p>
</div>

<!-- Compose box -->
<div class="compose-box">
  <div class="compose-top">
    <div class="compose-avatar" data-slot="compose-avatar"></div>
    <select class="compose-circle" id="composeCircle">
      <option value="all">All</option>
      <option value="hustle-hub">Hustle Hub</option>
      <option value="work-network">Work Network</option>
      <option value="family">Family</option>
    </select>
  </div>
  <textarea class="compose-body" id="composeBody" placeholder="Share something with the enclave..." rows="3"></textarea>
  <div id="driveAttachmentPreview" class="drive-preview" hidden></div>
  <div class="compose-actions">
    <button type="button" class="btn btn-ghost" id="driveAttachBtn">&#128193; Attach from Drive</button>
    <button class="btn btn-primary" id="composeSubmit">Post</button>
  </div>
</div>

<!-- Circle filter pills -->
<div class="filter-pills">
  <button class="pill active" data-filter="all">All</button>
  <button class="pill" data-filter="hustle-hub">Hustle Hub</button>
  <button class="pill" data-filter="work-network">Work Network</button>
  <button class="pill" data-filter="family">Family</button>
</div>

<!-- Feed list -->
<div class="feed-list" id="feedList">
  <div class="feed-loading text-muted">Loading posts...</div>
</div>
