<div class="page-header">
  <h1>Members</h1>
  <p class="text-muted">People in the enclave.</p>
</div>

<div class="members-search">
  <input
    type="search"
    id="membersSearchInput"
    class="edit-input"
    placeholder="Search by name or role..."
    autocomplete="off"
    aria-label="Search members"
  />
</div>

<div class="members-grid" id="membersList">
  <div class="skeleton-card" aria-hidden="true">
    <div class="skeleton-row">
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-stack">
        <div class="skeleton skeleton-line" style="width:60%"></div>
        <div class="skeleton skeleton-line" style="width:40%"></div>
      </div>
    </div>
  </div>
  <div class="skeleton-card" aria-hidden="true">
    <div class="skeleton-row">
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-stack">
        <div class="skeleton skeleton-line" style="width:55%"></div>
        <div class="skeleton skeleton-line" style="width:35%"></div>
      </div>
    </div>
  </div>
  <div class="skeleton-card" aria-hidden="true">
    <div class="skeleton-row">
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-stack">
        <div class="skeleton skeleton-line" style="width:65%"></div>
        <div class="skeleton skeleton-line" style="width:45%"></div>
      </div>
    </div>
  </div>
  <div class="skeleton-card" aria-hidden="true">
    <div class="skeleton-row">
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-stack">
        <div class="skeleton skeleton-line" style="width:50%"></div>
        <div class="skeleton skeleton-line" style="width:30%"></div>
      </div>
    </div>
  </div>
  <div class="skeleton-card" aria-hidden="true">
    <div class="skeleton-row">
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-stack">
        <div class="skeleton skeleton-line" style="width:58%"></div>
        <div class="skeleton skeleton-line" style="width:38%"></div>
      </div>
    </div>
  </div>
  <div class="skeleton-card" aria-hidden="true">
    <div class="skeleton-row">
      <div class="skeleton skeleton-avatar"></div>
      <div class="skeleton-stack">
        <div class="skeleton skeleton-line" style="width:62%"></div>
        <div class="skeleton skeleton-line" style="width:42%"></div>
      </div>
    </div>
  </div>
</div>

<!-- Profile modal (hidden by default, shown on member card click) -->
<div class="profile-modal" id="profileModal" hidden>
  <div class="profile-modal-backdrop" data-action="close-profile"></div>
  <div class="profile-modal-content">
    <button class="profile-modal-close" data-action="close-profile" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div id="profileModalBody"></div>
  </div>
</div>
