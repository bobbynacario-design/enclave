<div class="page-header">
  <h1>Messages</h1>
  <p class="text-muted">Direct conversations with enclave members.</p>
</div>

<div class="messages-shell">
  <aside class="messages-sidebar">
    <div class="messages-sidebar-header" id="messagesSidebarHeader">People</div>
    <div class="messages-people-list" id="messagesPeopleList">
      <div class="skeleton-row" style="padding:8px 0;border-bottom:1px solid var(--border)" aria-hidden="true">
        <div class="skeleton skeleton-avatar"></div>
        <div class="skeleton-stack">
          <div class="skeleton skeleton-line" style="width:55%"></div>
          <div class="skeleton skeleton-line" style="width:75%"></div>
        </div>
      </div>
      <div class="skeleton-row" style="padding:8px 0;border-bottom:1px solid var(--border)" aria-hidden="true">
        <div class="skeleton skeleton-avatar"></div>
        <div class="skeleton-stack">
          <div class="skeleton skeleton-line" style="width:45%"></div>
          <div class="skeleton skeleton-line" style="width:65%"></div>
        </div>
      </div>
      <div class="skeleton-row" style="padding:8px 0" aria-hidden="true">
        <div class="skeleton skeleton-avatar"></div>
        <div class="skeleton-stack">
          <div class="skeleton skeleton-line" style="width:60%"></div>
          <div class="skeleton skeleton-line" style="width:80%"></div>
        </div>
      </div>
    </div>
  </aside>

  <section class="messages-thread card">
    <div class="messages-thread-header">
      <div>
        <div class="messages-thread-title" id="messagesThreadTitle">Select a member</div>
        <div class="messages-thread-subtitle text-muted" id="messagesThreadSubtitle">Choose someone to start chatting.</div>
      </div>
    </div>

    <div class="messages-thread-list" id="messagesThreadList">
      <div class="messages-empty-state text-muted">No conversation selected yet.</div>
    </div>

    <form class="messages-compose" id="messagesComposer">
      <input
        type="text"
        class="messages-compose-input"
        id="messagesComposeInput"
        maxlength="500"
        placeholder="Write a message..."
        disabled
      />
      <button type="submit" class="btn" id="messagesSendBtn" disabled>Send</button>
    </form>
  </section>
</div>
