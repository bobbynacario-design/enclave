<div class="page-header page-header-row">
  <div>
    <h1>Projects</h1>
    <p class="text-muted">Collaborative workspaces.</p>
  </div>
  <button class="btn btn-primary" id="createProjectBtn">+ New Project</button>
</div>

<!-- Create/Edit modal -->
<div class="project-modal" id="projectModal">
  <div class="project-modal-backdrop" data-action="close-project-modal"></div>
  <div class="project-modal-content card">
    <h2 id="projectModalTitle">New Project</h2>
    <label class="form-label" for="projectNameInput">Name</label>
    <input type="text" class="form-input" id="projectNameInput" maxlength="100" />
    <label class="form-label mt-8" for="projectDescInput">Description</label>
    <textarea class="form-input" id="projectDescInput" rows="3" maxlength="500"></textarea>
    <label class="form-label mt-8" for="projectStatusInput">Status</label>
    <select class="form-input" id="projectStatusInput">
      <option value="active">Active</option>
      <option value="on-hold">On Hold</option>
      <option value="completed">Completed</option>
    </select>
    <label class="form-label mt-8">Members</label>
    <div id="projectMemberChecks">Loading members...</div>
    <div class="form-group" style="margin-top:16px;">
      <label class="form-label">Invite by email (not yet on Enclave)</label>
      <div class="pending-invites-input-row">
        <input type="email" id="projectPendingInviteInput" class="form-input"
               placeholder="someone@example.com" />
        <button type="button" id="projectPendingInviteAddBtn" class="btn btn-ghost">Add</button>
      </div>
      <div id="projectPendingInvitesList" class="pending-invites-list"></div>
      <p class="text-muted" style="font-size:11px;margin-top:4px;">
        They'll see this project on their Projects page once they sign in to Enclave.
      </p>
    </div>
    <div class="mt-16 flex gap-8">
      <button class="btn btn-primary" id="projectModalSave">Save</button>
      <button class="btn btn-ghost" id="projectModalCancel" type="button">Cancel</button>
    </div>
  </div>
</div>

<!-- Project list -->
<div class="projects-grid" id="projectsList">
  <div class="skeleton-card" aria-hidden="true">
    <div class="skeleton skeleton-line" style="width:55%;height:18px;margin-bottom:10px"></div>
    <div class="skeleton skeleton-line" style="width:100%"></div>
    <div class="skeleton skeleton-line" style="width:80%;margin-top:6px"></div>
    <div class="skeleton skeleton-line" style="width:28%;margin-top:10px"></div>
  </div>
  <div class="skeleton-card" aria-hidden="true">
    <div class="skeleton skeleton-line" style="width:48%;height:18px;margin-bottom:10px"></div>
    <div class="skeleton skeleton-line" style="width:100%"></div>
    <div class="skeleton skeleton-line" style="width:70%;margin-top:6px"></div>
    <div class="skeleton skeleton-line" style="width:32%;margin-top:10px"></div>
  </div>
</div>

<!-- Project detail (swapped in when selected) -->
<div id="projectDetail" hidden></div>
